# oauth2-proxy — прокси авторизации перед Swagger UI.
# Nginx делает auth_request на /oauth2/auth для проверки наличия cookie _oauth2_proxy.
# Если cookie нет, пользователь перенаправляется на Keycloak для логина.
# После успешного логина cookie устанавливается на домен localhost,
# что обеспечивает SSO для всех сервисов (backend-service, user-service и т.д.)
# без повторной авторизации.

http_address="0.0.0.0:4180"
cookie_secret="secretsecretsecr"
email_domains="*"
cookie_secure="false"
upstreams="http://backend-service:8080"
skip_provider_button="true"

# Передавать access token в заголовках ответа auth-subrequest (X-Auth-Request-Access-Token).
# Это позволяет nginx извлекать токен и подставлять его как Authorization: Bearer
# в API-запросы из Swagger UI, чтобы пользователю не нужно было авторизовываться повторно.
set_xauthrequest="true"
pass_access_token="true"

# keycloak provider
client_secret="6S4nbOfc26q10mlqzZB70SbdLm5r3H3H"
client_id="broken-store-client"
# Callback URL на порту 80 (nginx-gateway). После авторизации oauth2-proxy ставит cookie
# и редиректит пользователя обратно на исходный URL (параметр rd из query string).
redirect_url="http://localhost/oauth2/callback"

# OIDC: skip discovery to avoid hostname mismatch (keycloak:8082 inside Docker vs localhost:8082 in browser)
oidc_issuer_url="http://keycloak:8082/realms/broken-store-realm"
skip_oidc_discovery="true"
insecure_oidc_skip_issuer_verification="true"
insecure_oidc_allow_unverified_email="true"

# Browser-facing Keycloak URL for login redirect
login_url="http://localhost:8082/realms/broken-store-realm/protocol/openid-connect/auth"
# Internal Keycloak URLs for token exchange and JWKS
redeem_url="http://keycloak:8082/realms/broken-store-realm/protocol/openid-connect/token"
oidc_jwks_url="http://keycloak:8082/realms/broken-store-realm/protocol/openid-connect/certs"

oidc_extra_audiences="broken-store-client"
provider="oidc"
provider_display_name="Keycloak"

