# keycloak
keycloak.realm=broken-store-realm
keycloak.server-url=${KC_SERVER_URL:http://localhost:8082}
keycloak.client-id=broken-store-client
keycloak.grant-type=password
keycloak.client-secret=6S4nbOfc26q10mlqzZB70SbdLm5r3H3H

jwt.auth.converter.resource-id=${keycloak.client-id}
jwt.auth.converter.principal-attribute=preferred_username

# issuer-uri не задаётся, чтобы Spring не валидировал iss claim в JWT.
# Причина: токены из браузерного потока (oauth2-proxy) содержат iss=http://localhost:8082/...,
# а токены из /auth/login (внутри Docker) — iss=http://keycloak:8082/...
# Валидация подписи JWT обеспечивается через jwk-set-uri.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KC_SERVER_URL:${keycloak.server-url}}/realms/broken-store-realm/protocol/openid-connect/certs



logging.level.org.springframework.security=DEBUG
