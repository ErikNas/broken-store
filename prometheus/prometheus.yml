# Пути к метрикам включают context-path сервисов (/backend-service, /user-service),
# т.к. Spring Boot Actuator эндпоинты находятся под context-path.
# Prometheus обращается к сервисам напрямую по Docker-сети (без nginx).
scrape_configs:
  - job_name: 'backend-service'
    metrics_path: '/backend-service/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['backend-service:8080']

  - job_name: 'user-service'
    metrics_path: '/user-service/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['user-service:8080']

  - job_name: cadvisor
    scrape_interval: 10s
    static_configs:
      - targets: ['cadvisor-exporter:8081']