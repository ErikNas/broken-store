global:
  scrape_interval: 15s

scrape_configs:
  - job_name: spring-boot-application
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['backend-service:8080']   # см. ниже про targets

  - job_name: cadvisor
    scrape_interval: 10s
    static_configs:
      - targets: ['cadvisor:8081']
