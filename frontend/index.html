<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Store — Architecture</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Broken Store</h1>
    <div id="diagram">
        <svg id="connections"></svg>

        <a href="/" class="node" id="frontend" data-tooltip="Architecture diagram (this page), HTML/CSS/JS">
            <img src="https://cdn.simpleicons.org/html5/E34F26" alt="html5">
            <span>Frontend</span>
        </a>

        <a href="/" class="node" id="nginx" data-tooltip="Reverse proxy & routing, port 80">
            <img src="https://cdn.simpleicons.org/nginx/009639" alt="nginx">
            <span>Nginx Gateway</span>
        </a>

        <a href="http://localhost:8082" class="node" id="keycloak" target="_blank" data-tooltip="OAuth2/OIDC provider, port 8082">
            <img src="https://cdn.simpleicons.org/keycloak/4D4D4D" alt="keycloak">
            <span>Keycloak</span>
        </a>

        <a class="node no-link" id="oauth2-proxy" data-tooltip="Auth proxy for Swagger UI, port 4180">
            <img src="https://cdn.simpleicons.org/auth0/EB5424" alt="oauth2-proxy">
            <span>OAuth2 Proxy</span>
        </a>

        <a href="/backend-service/swagger-ui/index.html" class="node" id="backend-service" target="_blank" data-tooltip="Main REST API (Swagger), port 8085">
            <img src="https://cdn.simpleicons.org/springboot/6DB33F" alt="spring boot">
            <span>Backend Service</span>
        </a>

        <a href="/user-service/swagger-ui/index.html" class="node" id="user-service" target="_blank" data-tooltip="User management (Swagger), port 8086">
            <img src="https://cdn.simpleicons.org/springboot/6DB33F" alt="spring boot">
            <span>User Service</span>
        </a>

        <a href="http://localhost:8087" class="node" id="profanity" target="_blank" data-tooltip="Profanity validator (Python/Flask), port 8087">
            <img src="https://cdn.simpleicons.org/python/3776AB" alt="python">
            <span>Profanity Validator</span>
        </a>

        <a class="node no-link" id="postgres" data-tooltip="PostgreSQL 14.7, port 15432, DB: broken_store">
            <img src="https://cdn.simpleicons.org/postgresql/4169E1" alt="postgresql">
            <span>PostgreSQL</span>
        </a>

        <a href="http://localhost:9001" class="node" id="minio" target="_blank" data-tooltip="S3-compatible storage console, port 9001">
            <img src="https://cdn.simpleicons.org/minio/C72E49" alt="minio">
            <span>MinIO</span>
        </a>

        <a href="http://localhost:9090" class="node" id="prometheus" target="_blank" data-tooltip="Metrics collection, port 9090">
            <img src="https://cdn.simpleicons.org/prometheus/E6522C" alt="prometheus">
            <span>Prometheus</span>
        </a>

        <a href="http://localhost:3000" class="node" id="grafana" target="_blank" data-tooltip="Dashboards & visualization, port 3000">
            <img src="https://cdn.simpleicons.org/grafana/F46800" alt="grafana">
            <span>Grafana</span>
        </a>

        <a href="http://localhost:8081" class="node" id="cadvisor" target="_blank" data-tooltip="Container metrics exporter, port 8081">
            <img src="https://cdn.simpleicons.org/docker/2496ED" alt="cadvisor">
            <span>cAdvisor</span>
        </a>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
