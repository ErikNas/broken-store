<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Store — Architecture</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Broken Store</h1>
    <div id="diagram">
        <svg id="connections"></svg>

        <a href="/" class="node" id="frontend" data-tooltip="Architecture diagram (this page), HTML/CSS/JS">
            <img src="icons/html5.svg" alt="html5">
            <span>Frontend</span>
        </a>

        <a href="/" class="node" id="nginx" data-tooltip="Reverse proxy & routing, port 80">
            <img src="icons/nginx.svg" alt="nginx">
            <span>Nginx Gateway</span>
        </a>

        <a href="//:8082" class="node" id="keycloak" target="_blank" data-tooltip="OAuth2/OIDC provider, port 8082 (requires separate hostname)">
            <img src="icons/keycloak.svg" alt="keycloak">
            <span>Keycloak</span>
        </a>

        <a class="node no-link" id="oauth2-proxy" data-tooltip="Auth proxy for Swagger UI, port 4180">
            <img src="icons/auth0.svg" alt="oauth2-proxy">
            <span>OAuth2 Proxy</span>
        </a>

        <a href="/backend-service/swagger-ui/index.html" class="node" id="backend-service" target="_blank" data-tooltip="Main REST API (Swagger), port 8085">
            <img src="icons/springboot.svg" alt="spring boot">
            <span>Backend Service</span>
        </a>

        <a href="/user-service/swagger-ui/index.html" class="node" id="user-service" target="_blank" data-tooltip="User management (Swagger), port 8086">
            <img src="icons/springboot.svg" alt="spring boot">
            <span>User Service</span>
        </a>

        <a href="/profanity/" class="node" id="profanity" target="_blank" data-tooltip="Profanity validator (Python/Flask), /profanity/">
            <img src="icons/python.svg" alt="python">
            <span>Profanity Validator</span>
        </a>

        <a class="node no-link" id="postgres" data-tooltip="PostgreSQL 14.7, port 15432, DB: broken_store">
            <img src="icons/postgresql.svg" alt="postgresql">
            <span>PostgreSQL</span>
        </a>

        <a href="//:9001" class="node" id="minio" target="_blank" data-tooltip="S3-compatible storage console, port 9001">
            <img src="icons/minio.svg" alt="minio">
            <span>MinIO</span>
        </a>

        <a href="/prometheus/" class="node" id="prometheus" target="_blank" data-tooltip="Metrics collection, /prometheus/">
            <img src="icons/prometheus.svg" alt="prometheus">
            <span>Prometheus</span>
        </a>

        <a href="/grafana/" class="node" id="grafana" target="_blank" data-tooltip="Dashboards & visualization, /grafana/">
            <img src="icons/grafana.svg" alt="grafana">
            <span>Grafana</span>
        </a>

        <a href="//:8081" class="node" id="cadvisor" target="_blank" data-tooltip="Container metrics exporter, port 8081">
            <img src="icons/docker.svg" alt="cadvisor">
            <span>cAdvisor</span>
        </a>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
